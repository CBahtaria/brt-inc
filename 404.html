<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — BRT Inc.</title>
  <style>
    :root { --bg: #0B0B0C; --fg: #FFFFFF; --muted: #8E8E93; --accent: #2563EB; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--fg); font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100svh; text-align: center; padding: 2rem; }
    .code { font-size: clamp(5rem, 20vw, 10rem); font-weight: 800; letter-spacing: -.06em; color: var(--accent); line-height: 1; margin-bottom: 1rem; }
    p { color: var(--muted); margin-bottom: 2rem; font-size: 1.05rem; }
    a { display: inline-block; background: var(--accent); color: #fff; padding: .65rem 1.5rem; border-radius: .5rem; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <p>Page not found.</p>
    <a href="/">← Back to BRT Inc.</a>
  </div>
</body>
</html>
