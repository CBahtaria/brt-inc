<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="glow-teal" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-indigo" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="brt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Hexagon ring — flat-top, r=176 -->
  <polygon
    points="200,24 352,112 352,288 200,376 48,288 48,112"
    fill="none"
    stroke="url(#hex-grad)"
    stroke-width="3"
    filter="url(#glow-teal)"
    opacity="0.85"
  />

  <!-- Vertex dots -->
  <circle cx="200" cy="24"  r="7" fill="#2dd4bf" filter="url(#glow-teal)"/>
  <circle cx="352" cy="112" r="7" fill="#2dd4bf" filter="url(#glow-teal)"/>
  <circle cx="352" cy="288" r="7" fill="#2dd4bf" filter="url(#glow-teal)"/>
  <circle cx="200" cy="376" r="7" fill="#2dd4bf" filter="url(#glow-teal)"/>
  <circle cx="48"  cy="288" r="7" fill="#2dd4bf" filter="url(#glow-teal)"/>
  <circle cx="48"  cy="112" r="7" fill="#2dd4bf" filter="url(#glow-teal)"/>

  <!-- BRT -->
  <text
    x="200" y="235"
    text-anchor="middle"
    font-family="'Geist', 'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="128"
    font-weight="800"
    letter-spacing="-4"
    fill="url(#brt-grad)"
    filter="url(#glow-indigo)"
  >BRT</text>

  <!-- Divider -->
  <rect x="112" y="253" width="176" height="2" rx="1" fill="#2dd4bf" opacity="0.7" filter="url(#glow-teal)"/>

  <!-- INC. -->
  <text
    x="200" y="292"
    text-anchor="middle"
    font-family="'Geist Mono', 'JetBrains Mono', 'Courier New', monospace"
    font-size="32"
    font-weight="500"
    letter-spacing="12"
    fill="#2dd4bf"
    opacity="0.9"
  >INC.</text>
</svg>
