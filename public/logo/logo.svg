<?xml version="1.0" encoding="UTF-8"?>
<!--
  BRT Inc. — primary logo (glyph + wordmark, horizontal lockup).
  Composition rule: glyph height = cap-height of BRT wordmark.
                    gap glyph→word = 0.5 × cap-height.
                    baseline of glyph triangle = baseline of BRT text.
  Palette: navy #0F1E2E on transparent.
  Reference influence: 2014–2015 monoline logo studies — thin stroke, geometric
  primitives, grid-aligned, minimal weight.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" role="img" aria-label="BRT Inc.">
  <title>BRT Inc.</title>
  <style>
    .brt-word { font-family: "Inter", "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; font-weight: 800; font-size: 128px; fill: #0F1E2E; letter-spacing: -4px; }
    .brt-sub  { font-family: "Inter", "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; font-weight: 500; font-size: 28px; fill: #0F1E2E; letter-spacing: 2px; text-transform: uppercase; }
  </style>

  <!-- Glyph: monoline survey-mark, 128px tall (matches cap-height), 4px stroke. -->
  <g transform="translate(20 10)" fill="none" stroke="#0F1E2E" stroke-width="4" stroke-linejoin="miter" stroke-linecap="square">
    <polygon points="64,4 124,124 4,124" />
    <polygon points="64,104 30,42 98,42" />
    <circle cx="64" cy="76" r="5" fill="#0F1E2E" stroke="none" />
  </g>

  <!-- Wordmark, baseline-aligned to glyph bottom. -->
  <text class="brt-word" x="180" y="122">BRT</text>
  <text class="brt-sub"  x="506" y="122">INC.</text>
</svg>
