<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRT Inc. // Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #e8e6e1;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      border: 1px solid #333;
      padding: 2rem;
      min-width: 320px;
    }
    .login-title {
      color: #00ff88;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }
    .login-label {
      display: block;
      font-size: .85rem;
      color: #888;
      margin-bottom: .3rem;
    }
    .login-input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: #e8e6e1;
      padding: .6rem .8rem;
      font-family: monospace;
      font-size: 1rem;
      outline: none;
      margin-bottom: 1rem;
    }
    .login-input:focus {
      border-color: #555;
    }
    .login-error {
      color: #ff4444;
      font-size: .85rem;
      min-height: 1.2em;
      margin-bottom: .75rem;
    }
    .login-btn {
      width: 100%;
      background: #00ff88;
      color: #0a0a0a;
      border: none;
      padding: .6rem;
      font-family: monospace;
      font-size: 1rem;
      cursor: pointer;
    }
    .login-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">BRT Inc. // Internal Tools</div>
    <form id="login-form" novalidate>
      <label class="login-label" for="login-email">Email</label>
      <input
        id="login-email"
        class="login-input"
        type="email"
        placeholder="you@example.com"
        autocomplete="email"
        required
      />
      <label class="login-label" for="login-password">Password</label>
      <input
        id="login-password"
        class="login-input"
        type="password"
        placeholder="Password"
        autocomplete="current-password"
        required
      />
      <div id="login-error" class="login-error"></div>
      <button id="login-btn" class="login-btn" type="submit">Sign in</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/js/supabase-client.js"></script>
  <script>
    (function () {
      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('login-email');
      const passwordInput = document.getElementById('login-password');
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      function getReturnUrl() {
        const params = new URLSearchParams(window.location.search);
        const ret = params.get('return');
        if (ret && ret.startsWith('/') && !ret.startsWith('//')) return ret;
        return '/tools';
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorEl.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          errorEl.textContent = error.message;
          btn.disabled = false;
          btn.textContent = 'Sign in';
          passwordInput.value = '';
          passwordInput.focus();
          return;
        }

        window.location.replace(getReturnUrl());
      });
    })();
  </script>
</body>
</html>
