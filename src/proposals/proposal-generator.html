<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>BRT Inc. Proposal Generator</title>
  <script src="/src/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/js/supabase-client.js"></script>
  <script src="/src/js/auth.js"></script>
  <script src="/src/js/db.js"></script>
  <style>
    :root { --bg:#0a0a0a; --fg:#e8e6e1; --accent:#00ff88; --muted:#6b6b6b; --border:#1e1e1e; --card:#111; --font:'Courier New',monospace; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; padding:1.5rem; }
    .workspace { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; max-width:1200px; margin:0 auto; }
    @media(max-width:768px) { .workspace { grid-template-columns:1fr; } }
    h1 { color:var(--accent); font-size:1rem; margin-bottom:1.5rem; }
    .panel { background:var(--card); border:1px solid var(--border); padding:1.5rem; }
    .panel h2 { color:var(--muted); font-size:.75rem; text-transform:uppercase; letter-spacing:.1em; margin-bottom:1rem; }
    label { display:block; color:var(--muted); font-size:.75rem; margin-bottom:.2rem; margin-top:.7rem; }
    input, select, textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--fg); padding:.5rem .7rem; font-family:var(--font); font-size:.85rem; outline:none; }
    input:focus, select:focus, textarea:focus { border-color:var(--accent); }
    textarea { resize:vertical; }
    .actions { display:flex; gap:.5rem; margin-top:1rem; }
    .btn { border:none; padding:.4rem 1rem; font-family:var(--font); font-size:.85rem; cursor:pointer; }
    .btn-print { background:var(--accent); color:var(--bg); }
    .btn-clear { background:none; border:1px solid var(--border); color:var(--muted); }
    .btn-save-draft { background:none; border:1px solid var(--accent); color:var(--accent); }
    .btn-send { background:#1a1a2e; border:1px solid #4444ff; color:#8888ff; }

    /* Preview — renders as it will print */
    #preview { background:#fff; color:#111; padding:2rem; font-family:'Courier New',monospace; font-size:12px; line-height:1.6; min-height:400px; }
    #preview .pre-brand { color:#000; font-size:14px; font-weight:bold; margin-bottom:.2rem; }
    #preview .pre-tagline { color:#666; font-size:10px; margin-bottom:1.5rem; border-bottom:1px solid #ccc; padding-bottom:.8rem; }
    #preview .pre-to { margin-bottom:1.5rem; }
    #preview .pre-label { color:#666; font-size:10px; text-transform:uppercase; }
    #preview h2 { font-size:13px; margin:1rem 0 .3rem; color:#000; }
    #preview p { margin-bottom:.5rem; color:#333; }
    #preview table { width:100%; border-collapse:collapse; margin:1rem 0; font-size:11px; }
    #preview th { text-align:left; border-bottom:1px solid #ccc; padding:.3rem .5rem; color:#666; font-weight:normal; }
    #preview td { padding:.3rem .5rem; border-bottom:1px solid #eee; }
    #preview td:last-child { text-align:right; }
    #preview .pre-total { text-align:right; font-weight:bold; margin-top:.5rem; }
    #preview .pre-footer { margin-top:2rem; padding-top:1rem; border-top:1px solid #ccc; color:#666; font-size:9px; }

    @media print {
      body > * { display:none !important; }
      #print-area { display:block !important; }
      #preview { padding:0; box-shadow:none; }
    }
  </style>
</head>
<body>

<h1>BRT Inc. // Proposal Generator</h1>

<div id="drafts-bar" style="margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
  <span style="color:var(--muted);font-size:.75rem">Load draft:</span>
  <select id="drafts-select" style="background:var(--card);border:1px solid var(--border);color:var(--fg);padding:.3rem .5rem;font-family:var(--font);font-size:.8rem;max-width:300px">
    <option value="">-- select saved draft --</option>
  </select>
</div>

<div class="workspace">
  <div class="panel">
    <h2>Proposal Details</h2>
    <label>Client name / company</label>
    <input type="text" id="p-client" placeholder="Studio P Barbershop" oninput="update()" />
    <label>Client email</label>
    <input type="email" id="p-email" placeholder="client@example.com" oninput="update()" />
    <label>Proposal date</label>
    <input type="date" id="p-date" oninput="update()" />
    <label>Project title</label>
    <input type="text" id="p-title" placeholder="Booking &amp; Staff Management System" oninput="update()" />
    <label>Scope description</label>
    <textarea id="p-scope" rows="4" placeholder="Describe what will be built..." oninput="update()"></textarea>
    <label>Deliverables (one per line)</label>
    <textarea id="p-deliverables" rows="4" placeholder="Full source code&#10;Test suite (unit + integration)&#10;Docker Compose deployment&#10;GitHub Actions CI/CD&#10;30-day bug-fix warranty" oninput="update()"></textarea>
    <label>Line items</label>
    <div id="items-container"></div>
    <button onclick="addItem()" style="margin-top:.5rem;background:none;border:1px solid var(--border);color:var(--muted);padding:.3rem .7rem;font-family:var(--font);cursor:pointer;font-size:.8rem">+ Add line item</button>
    <label>Payment terms</label>
    <select id="p-terms" onchange="update()">
      <option value="50% deposit before work begins, 50% on delivery">50/50 deposit + delivery</option>
      <option value="100% deposit before work begins">100% upfront</option>
      <option value="30% deposit, 70% on delivery">30/70 deposit + delivery</option>
      <option value="Hourly, invoiced weekly">Hourly, weekly invoice</option>
    </select>
    <label>Notes / validity</label>
    <input type="text" id="p-notes" value="Valid for 14 days from proposal date." oninput="update()" />
    <div class="actions">
      <button class="btn btn-print" onclick="window.print()">Print / Save PDF</button>
      <button class="btn btn-save-draft" id="btn-save-draft">Save Draft</button>
      <button class="btn btn-send" id="btn-send">Send to Client</button>
      <button class="btn btn-clear" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <div class="panel" id="print-area">
    <h2>Preview</h2>
    <div id="preview"></div>
  </div>
</div>

<script>
  let items = [{ desc: 'Development', qty: 1, rate: 0 }];

  function addItem() {
    items.push({ desc: '', qty: 1, rate: 0 });
    renderItems(); update();
  }

  function removeItem(i) { items.splice(i, 1); renderItems(); update(); }

  function renderItems() {
    const c = document.getElementById('items-container');
    c.innerHTML = items.map((item, i) => `
      <div style="display:grid;grid-template-columns:1fr 60px 80px 24px;gap:.3rem;margin-bottom:.3rem;align-items:center">
        <input type="text" value="${esc(item.desc)}" placeholder="Description"
          data-item="${i}" data-field="desc"
          style="font-size:.8rem;padding:.3rem .5rem" />
        <input type="number" value="${item.qty}" min="1"
          data-item="${i}" data-field="qty"
          style="font-size:.8rem;padding:.3rem .5rem" />
        <input type="number" value="${item.rate}" min="0"
          data-item="${i}" data-field="rate"
          style="font-size:.8rem;padding:.3rem .5rem" />
        <button data-remove="${i}"
          style="background:none;border:none;color:#ff4444;cursor:pointer;font-size:1rem">×</button>
      </div>`).join('') +
      '<div style="color:var(--muted);font-size:.7rem;display:grid;grid-template-columns:1fr 60px 80px 24px;gap:.3rem"><span>Description</span><span>Qty</span><span>Rate ($)</span></div>';

    // Attach listeners via delegation
    c.addEventListener('input', handleItemInput);
    c.addEventListener('click', handleItemRemove);
  }

  function handleItemInput(e) {
    const el = e.target;
    const i = parseInt(el.dataset.item);
    const field = el.dataset.field;
    if (isNaN(i) || !field) return;
    items[i][field] = field === 'desc' ? el.value : +el.value;
    updatePreviewOnly();
  }

  function handleItemRemove(e) {
    const btn = e.target.closest('button[data-remove]');
    if (!btn) return;
    removeItem(parseInt(btn.dataset.remove));
  }

  function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function updatePreviewOnly() {
    const client = document.getElementById('p-client').value || '[Client Name]';
    const email = document.getElementById('p-email').value || '';
    const date = document.getElementById('p-date').value || new Date().toISOString().slice(0,10);
    const title = document.getElementById('p-title').value || '[Project Title]';
    const scope = esc(document.getElementById('p-scope').value || '').replace(/\n/g, '<br>');
    const delivs = document.getElementById('p-deliverables').value.split('\n').filter(Boolean);
    const terms = document.getElementById('p-terms').value;
    const notes = document.getElementById('p-notes').value;
    const total = items.reduce((s, i) => s + (i.qty * i.rate), 0);

    document.getElementById('preview').innerHTML = `
      <div class="pre-brand">BRT Inc.</div>
      <div class="pre-tagline">Software Engineering &amp; Data Systems · charleskris9@gmail.com · brtinc.dev · Manzini, Eswatini</div>
      <div class="pre-to">
        <div class="pre-label">Prepared for</div>
        <div>${esc(client)}${email ? ' · ' + esc(email) : ''}</div>
        <div class="pre-label" style="margin-top:.3rem">Date</div>
        <div>${esc(date)}</div>
      </div>
      <h2>Project Proposal: ${esc(title)}</h2>
      <h2>Scope</h2>
      <p>${scope || '—'}</p>
      <h2>Deliverables</h2>
      <p>${delivs.map(d => '→ ' + esc(d)).join('<br>') || '—'}</p>
      <h2>Pricing</h2>
      <table>
        <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead>
        <tbody>
          ${items.map(i => `<tr><td>${esc(i.desc)}</td><td>${i.qty}</td><td>R${i.rate.toLocaleString()}</td><td>R${(i.qty*i.rate).toLocaleString()}</td></tr>`).join('')}
        </tbody>
      </table>
      <div class="pre-total">Total: R${total.toLocaleString()} ZAR</div>
      <h2>Payment Terms</h2>
      <p>${esc(terms)}</p>
      <h2>Notes</h2>
      <p>${esc(notes)}</p>
      <div class="pre-footer">
        This proposal is subject to BRT Inc. Terms &amp; Conditions. Payment of the deposit constitutes acceptance of terms.
        Balance due on delivery. 30-day bug-fix warranty on all fixed-scope projects. Governing law: Kingdom of Eswatini.
        <br>Charles Bartaria · BRT Inc. · charleskris9@gmail.com · github.com/CBahtaria
      </div>`;
  }

  function update() { updatePreviewOnly(); }

  function clearForm() {
    ['p-client','p-email','p-title','p-scope','p-deliverables'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('p-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('p-notes').value = 'Valid for 14 days from proposal date.';
    items = [{ desc: 'Development', qty: 1, rate: 0 }];
    renderItems(); update();
  }

  async function saveDraft() {
    const btn = document.getElementById('btn-save-draft');
    btn.disabled = true;
    const total = items.reduce((s, i) => s + (i.qty * i.rate), 0);
    const metaEntry = {
      _meta: true,
      client: document.getElementById('p-client').value.trim(),
      email: document.getElementById('p-email').value.trim(),
      deliverables: document.getElementById('p-deliverables').value.trim(),
      notes: document.getElementById('p-notes').value.trim(),
      terms: document.getElementById('p-terms').value,
    };
    const data = {
      title: document.getElementById('p-title').value.trim() || 'Untitled Proposal',
      scope: document.getElementById('p-scope').value.trim(),
      line_items: [...items, metaEntry],
      total,
      status: 'draft',
    };
    // Preserve id if editing existing draft
    const draftId = document.getElementById('btn-save-draft').dataset.draftId;
    if (draftId) data.id = draftId;
    try {
      const saved = await window.db.upsertProposal(data);
      if (saved && saved[0]?.id) {
        document.getElementById('btn-save-draft').dataset.draftId = saved[0].id;
      }
      await loadDrafts();
      alert('Draft saved.');
    } catch (err) {
      alert('Save failed: ' + err.message);
    } finally {
      btn.disabled = false;
    }
  }

  async function loadDrafts() {
    try {
      const proposals = await window.db.getProposals();
      const sel = document.getElementById('drafts-select');
      sel.innerHTML = '<option value="">-- select saved draft --</option>' +
        proposals.map(p => `<option value="${p.id}">${esc(p.title)} (${p.created_at ? p.created_at.slice(0,10) : ''})</option>`).join('');
    } catch (err) {
      // non-fatal: drafts bar just stays empty
    }
  }

  async function sendToClient() {
    const email = document.getElementById('p-email').value.trim();
    if (!email) { alert('Enter a client email address first.'); return; }
    const btn = document.getElementById('btn-send');
    btn.disabled = true;
    const subject = 'Proposal: ' + (document.getElementById('p-title').value.trim() || 'BRT Inc.');
    const html = document.getElementById('preview').innerHTML;
    try {
      const session = await window.supabaseClient.auth.getSession();
      const token = session.data.session?.access_token;
      if (!token) throw new Error('Session expired — please reload and try again.');
      const res = await fetch('/api/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ to: email, subject, html, type: 'proposal' }),
      });
      if (!res.ok) throw new Error((await res.json()).error || res.statusText);
      alert('Proposal sent to ' + email);
    } catch (err) {
      alert('Send failed: ' + err.message);
    } finally {
      btn.disabled = false;
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await requireAuth();

    // Load saved drafts
    await loadDrafts();

    // Wire buttons
    document.getElementById('btn-save-draft').addEventListener('click', saveDraft);
    document.getElementById('btn-send').addEventListener('click', sendToClient);

    // Load draft when selected
    document.getElementById('drafts-select').addEventListener('change', async function() {
      const id = this.value;
      if (!id) return;
      try {
        const proposals = await window.db.getProposals();
        const p = proposals.find(x => x.id === id);
        if (!p) return;
        // Extract meta entry if present
        const meta = p.line_items?.find(x => x._meta);
        const lineItems = p.line_items?.filter(x => !x._meta) || [];
        document.getElementById('p-title').value = p.title || '';
        document.getElementById('p-scope').value = p.scope || '';
        if (meta) {
          document.getElementById('p-client').value = meta.client || '';
          document.getElementById('p-email').value = meta.email || '';
          document.getElementById('p-deliverables').value = meta.deliverables || '';
          document.getElementById('p-notes').value = meta.notes || '';
          document.getElementById('p-terms').value = meta.terms || document.getElementById('p-terms').value;
        }
        if (lineItems.length) {
          items = lineItems;
          renderItems();
        }
        // Store the draft id for save-as-update
        document.getElementById('btn-save-draft').dataset.draftId = p.id;
        update();
      } catch (err) {
        alert('Load failed: ' + err.message);
      }
    });

    document.getElementById('p-date').value = new Date().toISOString().slice(0,10);
    renderItems();
    update();
  });
</script>
</body>
</html>
