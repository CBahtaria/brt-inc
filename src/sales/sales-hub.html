<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>BRT Inc. — Sales Hub</title>
  <script src="/src/js/auth.js"></script>
  <style>
    :root { --bg:#0a0a0a; --fg:#e8e6e1; --accent:#00ff88; --muted:#6b6b6b; --border:#1e1e1e; --card:#111; --font:'Courier New',monospace; --red:#ff4444; --amber:#f59e0b; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; line-height:1.7; padding:1.5rem; }
    h1 { color:var(--accent); font-size:1rem; margin-bottom:.2rem; }
    .sub { color:var(--muted); font-size:.8rem; margin-bottom:1.2rem; }

    /* Tabs */
    .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:1.5rem; }
    .tab { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); padding:.5rem 1.2rem; font-family:var(--font); font-size:.82rem; cursor:pointer; margin-bottom:-1px; }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab:hover:not(.active) { color:var(--fg); }
    .pane { display:none; }
    .pane.active { display:block; }

    /* Scripts pane */
    .scripts-grid { display:grid; grid-template-columns:220px 1fr; gap:1.2rem; }
    @media(max-width:700px) { .scripts-grid { grid-template-columns:1fr; } }
    .script-nav { display:flex; flex-direction:column; gap:2px; }
    .script-nav-section { color:var(--muted); font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; padding:.5rem .6rem .2rem; }
    .script-nav-item { background:none; border:none; text-align:left; color:var(--muted); font-family:var(--font); font-size:.8rem; padding:.35rem .6rem; cursor:pointer; border-left:2px solid transparent; }
    .script-nav-item:hover { color:var(--fg); }
    .script-nav-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(0,255,136,.04); }
    .script-content { background:var(--card); border:1px solid var(--border); padding:1.2rem; }
    .script-title { color:var(--accent); font-size:.85rem; margin-bottom:.3rem; }
    .script-meta { color:var(--muted); font-size:.75rem; margin-bottom:.8rem; }
    .script-subject { background:var(--bg); border:1px solid var(--border); padding:.4rem .6rem; font-size:.8rem; margin-bottom:.6rem; color:var(--fg); }
    .script-subject em { color:var(--muted); }
    .script-body { background:var(--bg); border:1px solid var(--border); padding:.8rem; font-size:.82rem; white-space:pre-wrap; line-height:1.7; color:var(--fg); min-height:120px; }
    .script-body .var { color:var(--amber); }
    .copy-btn { margin-top:.6rem; background:var(--accent); color:var(--bg); border:none; padding:.35rem .9rem; font-family:var(--font); font-size:.78rem; cursor:pointer; }
    .copy-btn:hover { opacity:.85; }
    .copy-btn.copied { background:#2a7a4a; }

    /* Prospects pane */
    .prospects-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.8rem; }
    .prospects-header h2 { color:var(--muted); font-size:.75rem; text-transform:uppercase; letter-spacing:.1em; }
    .add-prospect-btn { background:var(--accent); color:var(--bg); border:none; padding:.3rem .8rem; font-family:var(--font); font-size:.78rem; cursor:pointer; }
    .prospect-card { background:var(--card); border:1px solid var(--border); padding:.9rem 1rem; margin-bottom:.4rem; display:grid; grid-template-columns:1fr auto; gap:.8rem; align-items:start; }
    .prospect-card:hover { border-color:var(--muted); }
    .p-name { color:var(--fg); font-size:.88rem; font-weight:bold; }
    .p-meta { color:var(--muted); font-size:.75rem; margin-top:.15rem; }
    .p-pitch { color:var(--fg); font-size:.78rem; margin-top:.3rem; border-left:2px solid var(--border); padding-left:.5rem; }
    .p-actions { display:flex; flex-direction:column; gap:.3rem; align-items:flex-end; }
    .p-btn { background:none; border:1px solid var(--border); color:var(--muted); font-family:var(--font); font-size:.72rem; padding:.25rem .6rem; cursor:pointer; white-space:nowrap; }
    .p-btn:hover { border-color:var(--accent); color:var(--accent); }
    .p-tag { font-size:.68rem; padding:.15rem .5rem; border-radius:2px; }
    .tag-local { background:rgba(0,255,136,.08); color:var(--accent); border:1px solid rgba(0,255,136,.2); }
    .tag-sa { background:rgba(59,130,246,.1); color:#3b82f6; border:1px solid rgba(59,130,246,.2); }
    .tag-bw { background:rgba(245,158,11,.08); color:var(--amber); border:1px solid rgba(245,158,11,.2); }

    /* Call prep pane */
    .call-prep { max-width:640px; }
    .call-form { background:var(--card); border:1px solid var(--border); padding:1.2rem; margin-bottom:1rem; }
    label { display:block; color:var(--muted); font-size:.75rem; margin-bottom:.2rem; margin-top:.7rem; }
    input, select, textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--fg); padding:.45rem .6rem; font-family:var(--font); font-size:.82rem; outline:none; }
    input:focus, select:focus { border-color:var(--accent); }
    select option { background:var(--bg); }
    .gen-btn { background:var(--accent); color:var(--bg); border:none; padding:.4rem 1.2rem; font-family:var(--font); font-size:.85rem; cursor:pointer; margin-top:.8rem; }
    .call-output { display:none; background:var(--card); border:1px solid var(--border); padding:1.2rem; }
    .call-output.show { display:block; }
    .call-section { margin-bottom:1.2rem; }
    .call-section h3 { color:var(--accent); font-size:.8rem; margin-bottom:.5rem; text-transform:uppercase; letter-spacing:.08em; }
    .call-section p, .call-section li { color:var(--fg); font-size:.83rem; }
    .call-section ul { padding-left:1.2rem; }
    .call-section li { margin-bottom:.3rem; }
    .callout { background:var(--bg); border:1px solid var(--border); border-left:3px solid var(--accent); padding:.6rem .8rem; font-size:.82rem; }

    /* Channels pane */
    .channel-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1px; border:1px solid var(--border); }
    .channel-card { background:var(--card); padding:1.1rem; }
    .channel-card h3 { color:var(--accent); font-size:.85rem; margin-bottom:.3rem; }
    .channel-card .priority { font-size:.7rem; padding:.15rem .5rem; border-radius:2px; margin-left:.4rem; vertical-align:middle; }
    .p-hot { background:rgba(255,68,68,.12); color:var(--red); border:1px solid rgba(255,68,68,.2); }
    .p-warm { background:rgba(245,158,11,.1); color:var(--amber); border:1px solid rgba(245,158,11,.2); }
    .p-cool { background:rgba(100,100,100,.15); color:var(--muted); border:1px solid var(--border); }
    .channel-card p { color:var(--muted); font-size:.78rem; margin:.4rem 0; }
    .channel-card a { color:var(--accent); font-size:.78rem; }
    .channel-tactic { color:var(--fg); font-size:.78rem; background:var(--bg); border:1px solid var(--border); padding:.4rem .6rem; margin-top:.5rem; }
    .channel-tactic strong { color:var(--accent); }

    /* Prospect modal */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:100; align-items:center; justify-content:center; }
    .modal-bg.open { display:flex; }
    .modal { background:var(--card); border:1px solid var(--border); padding:1.5rem; width:100%; max-width:440px; max-height:90vh; overflow-y:auto; }
    .modal h2 { color:var(--accent); font-size:.9rem; margin-bottom:1rem; }
    .modal-actions { display:flex; justify-content:flex-end; gap:.5rem; margin-top:1rem; }
    .btn-cancel { background:none; border:1px solid var(--border); color:var(--muted); padding:.35rem .8rem; font-family:var(--font); font-size:.8rem; cursor:pointer; }
    .btn-save { background:var(--accent); color:var(--bg); border:none; padding:.35rem 1rem; font-family:var(--font); font-size:.8rem; cursor:pointer; }
  </style>
</head>
<body>

<h1>BRT Inc. // Sales Hub</h1>
<p class="sub">Scripts · Prospects · Call Prep · Channels</p>

<div class="tabs">
  <button class="tab active" data-pane="scripts">Scripts</button>
  <button class="tab" data-pane="prospects">Prospects</button>
  <button class="tab" data-pane="callprep">Call Prep</button>
  <button class="tab" data-pane="channels">Channels</button>
</div>

<!-- ── SCRIPTS ── -->
<div class="pane active" id="pane-scripts">
  <div class="scripts-grid">
    <div class="script-nav" id="script-nav"></div>
    <div class="script-content" id="script-display">
      <div style="color:var(--muted);font-size:.82rem">← Select a script</div>
    </div>
  </div>
</div>

<!-- ── PROSPECTS ── -->
<div class="pane" id="pane-prospects">
  <div class="prospects-header">
    <h2>Researched prospects</h2>
    <button class="add-prospect-btn" onclick="openProspectModal(null)">+ Add</button>
  </div>
  <div id="prospects-list"></div>
</div>

<!-- ── CALL PREP ── -->
<div class="pane" id="pane-callprep">
  <div class="call-prep">
    <div class="call-form">
      <label>Contact name</label>
      <input id="cp-name" placeholder="e.g. Thulani" oninput="genCallPrep()" />
      <label>Company</label>
      <input id="cp-company" placeholder="e.g. Total Experience Tours" oninput="genCallPrep()" />
      <label>Industry</label>
      <select id="cp-industry" onchange="genCallPrep()">
        <option value="">— select —</option>
        <option value="hospitality">Hospitality / Tourism / Lodge</option>
        <option value="professional">Professional Services (legal, accounting, consulting)</option>
        <option value="retail">Retail / E-commerce</option>
        <option value="healthcare">Healthcare / Medical</option>
        <option value="ngo">NGO / Development organisation</option>
        <option value="education">Education / Training</option>
        <option value="other">Other</option>
      </select>
      <label>Service to pitch</label>
      <select id="cp-service" onchange="genCallPrep()">
        <option value="">— select —</option>
        <option value="webapp">Web App / Booking System</option>
        <option value="audit">Security Audit</option>
        <option value="both">Both (qualify on call)</option>
        <option value="hourly">Hourly retainer / maintenance</option>
      </select>
      <button class="gen-btn" onclick="genCallPrep()">Generate Call Sheet</button>
    </div>
    <div class="call-output" id="call-output"></div>
  </div>
</div>

<!-- ── CHANNELS ── -->
<div class="pane" id="pane-channels">
  <div class="channel-grid" id="channel-grid"></div>
</div>

<!-- Prospect add/edit modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Add Prospect</h2>
    <input type="hidden" id="m-id" />
    <label>Business name</label>
    <input id="m-name" placeholder="eSibayeni Lodge" />
    <label>Contact email</label>
    <input id="m-email" placeholder="info@company.com" type="email" />
    <label>Phone / WhatsApp</label>
    <input id="m-phone" placeholder="+268 7xxx xxxx" />
    <label>Website</label>
    <input id="m-website" placeholder="company.co.sz" />
    <label>Country</label>
    <select id="m-country">
      <option value="SZ">Eswatini</option>
      <option value="ZA">South Africa</option>
      <option value="BW">Botswana</option>
      <option value="ZW">Zimbabwe</option>
      <option value="ZM">Zambia</option>
      <option value="MZ">Mozambique</option>
      <option value="NA">Namibia</option>
      <option value="LS">Lesotho</option>
    </select>
    <label>Industry</label>
    <input id="m-industry" placeholder="Hospitality, Legal, NGO..." />
    <label>Service pitch</label>
    <input id="m-pitch" placeholder="Booking system, security audit..." />
    <label>Notes / Research</label>
    <textarea id="m-notes" rows="3" placeholder="What do you know about them? Pain points?"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveProspect()">Save</button>
    </div>
  </div>
</div>

function init() {
  buildScriptNav();
  renderProspects();
  renderChannels();
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.pane)));
}

function switchTab(pane) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.pane === pane));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + pane));
}

// ── Scripts ──
function buildScriptNav() {
  const nav = document.getElementById('script-nav');
  let currentSection = '';
  SCRIPTS.forEach(s => {
    if (s.section !== currentSection) {
      currentSection = s.section;
      const label = document.createElement('div');
      label.className = 'script-nav-section';
      label.textContent = s.section;
      nav.appendChild(label);
    }
    const btn = document.createElement('button');
    btn.className = 'script-nav-item';
    btn.textContent = s.title.replace(/^.+ — /, '').replace(/^.+ — /, '');
    btn.dataset.id = s.id;
    btn.onclick = () => showScript(s.id, btn);
    nav.appendChild(btn);
  });
}

function showScript(id, btn) {
  const s = SCRIPTS.find(x => x.id === id);
  if (!s) return;
  document.querySelectorAll('.script-nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const channelColor = { Email:'var(--accent)', LinkedIn:'#3b82f6', WhatsApp:'#25d366', Phone:'var(--amber)', Any:'var(--muted)' }[s.channel.split(' ')[0]] || 'var(--muted)';
  const body = s.body.replace(/\[([^\]]+)\]/g, '<span class="var">[$1]</span>');
  document.getElementById('script-display').innerHTML = `
    <div class="script-title">${esc(s.title)}</div>
    <div class="script-meta">Channel: <span style="color:${channelColor}">${esc(s.channel)}</span></div>
    ${s.subject ? `<div class="script-subject"><em>Subject: </em>${esc(s.subject)}</div>` : ''}
    <div class="script-body">${body}</div>
    <button class="copy-btn" id="copy-btn-${esc(s.id)}" onclick="copyScript('${esc(s.id)}')">Copy to clipboard</button>`;
}

function copyScript(id) {
  const s = SCRIPTS.find(x => x.id === id);
  if (!s) return;
  const text = (s.subject ? 'Subject: ' + s.subject + '\n\n' : '') + s.body;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn-' + id);
    if (!btn) return;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy to clipboard'; btn.classList.remove('copied'); }, 2000);
  });
}

const countryLabel = { SZ:'🇸🇿 Eswatini', ZA:'🇿🇦 South Africa', BW:'🇧🇼 Botswana', ZW:'🇿🇼 Zimbabwe', ZM:'🇿🇲 Zambia', MZ:'🇲🇿 Mozambique', NA:'🇳🇦 Namibia', LS:'🇱🇸 Lesotho' };

function renderProspects() {
  const list = document.getElementById('prospects-list');
  list.innerHTML = prospects.map(p => `
    <div class="prospect-card" id="pc-${esc(p.id)}">
      <div>
        <div class="p-name">${esc(p.name)} <span class="p-tag ${tagClass[p.country]||'tag-bw'}">${countryLabel[p.country]||p.country}</span></div>
        <div class="p-meta">
          ${p.industry ? esc(p.industry) + ' · ' : ''}
          ${p.email ? `<a href="mailto:${esc(p.email)}" style="color:var(--accent)">${esc(p.email)}</a>` : '<em style="color:var(--muted)">no email</em>'}
          ${p.phone ? ' · <a href="https://wa.me/'+esc(p.phone.replace(/[^0-9]/g,''))+'" style="color:#25d366" target="_blank">'+esc(p.phone)+'</a>' : ''}
          ${p.website ? ' · <a href="https://'+esc(p.website)+'" style="color:var(--muted)" target="_blank">'+esc(p.website)+'</a>' : ''}
        </div>
        ${p.pitch ? `<div class="p-pitch">${esc(p.pitch)}</div>` : ''}
        ${p.notes ? `<div class="p-meta" style="margin-top:.3rem;font-style:italic">${esc(p.notes)}</div>` : ''}
      </div>
      <div class="p-actions">
        <button class="p-btn" onclick="copyContact('${esc(p.id)}')">Copy contact</button>
        <button class="p-btn" onclick="addToCRM('${esc(p.id)}')">Add to CRM →</button>
        <button class="p-btn" onclick="openProspectModal('${esc(p.id)}')">Edit</button>
        <button class="p-btn" style="color:#ff4444;border-color:#331111" onclick="deleteProspect('${esc(p.id)}')">Remove</button>
      </div>
    </div>`).join('');
}

function copyContact(id) {
  const p = prospects.find(x => x.id === id);
  if (!p) return;
  const txt = [p.name, p.email, p.phone, p.website ? 'https://'+p.website : ''].filter(Boolean).join('\n');
  navigator.clipboard.writeText(txt).then(() => {
    const btns = document.querySelectorAll(`#pc-${id} .p-btn`);
    if (btns[0]) { btns[0].textContent = 'Copied!'; setTimeout(() => { btns[0].textContent = 'Copy contact'; }, 1500); }
  });
}

function addToCRM(id) {
  const p = prospects.find(x => x.id === id);
  if (!p) return;
  const CRM_KEY = 'brt_crm_v1';
  let crm = [];
  try { crm = JSON.parse(localStorage.getItem(CRM_KEY)) || []; } catch {}
  const exists = crm.find(c => c.email === p.email && p.email);
  if (exists) { alert(p.name + ' is already in the CRM.'); return; }
  crm.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,5), name: p.name, stage:'Lead', service: p.pitch || '', value:'', email: p.email || '', phone: p.phone || '', linkedin:'', source:'Research', nextFollowUp:'', notes: p.notes || '', date: new Date().toISOString() });
  localStorage.setItem(CRM_KEY, JSON.stringify(crm));
  alert(p.name + ' added to CRM as Lead.');
}

function deleteProspect(id) {
  if (!confirm('Remove this prospect?')) return;
  prospects = prospects.filter(p => p.id !== id);
  saveProspects(prospects);
  renderProspects();
}

function openProspectModal(id) {
  const p = id ? prospects.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = p ? 'Edit Prospect' : 'Add Prospect';
  document.getElementById('m-id').value = p?.id || '';
  document.getElementById('m-name').value = p?.name || '';
  document.getElementById('m-email').value = p?.email || '';
  document.getElementById('m-phone').value = p?.phone || '';
  document.getElementById('m-website').value = p?.website || '';
  document.getElementById('m-country').value = p?.country || 'SZ';
  document.getElementById('m-industry').value = p?.industry || '';
  document.getElementById('m-pitch').value = p?.pitch || '';
  document.getElementById('m-notes').value = p?.notes || '';
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('m-name').focus();
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function saveProspect() {
  const id = document.getElementById('m-id').value;
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Name required.'); return; }
  const entry = { id: id || Date.now().toString(36), name, email: document.getElementById('m-email').value.trim(), phone: document.getElementById('m-phone').value.trim(), website: document.getElementById('m-website').value.trim(), country: document.getElementById('m-country').value, industry: document.getElementById('m-industry').value.trim(), pitch: document.getElementById('m-pitch').value.trim(), notes: document.getElementById('m-notes').value.trim() };
  if (id) { prospects = prospects.map(p => p.id === id ? entry : p); }
  else { prospects.push(entry); }
  saveProspects(prospects);
  renderProspects();
  closeModal();
}
